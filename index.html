  <!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduAll — Lista de Contactos</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --primary-dark: #1d4ed8;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --warning: #d97706;
  --warning-light: #fffbeb;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --info: #0891b2;
  --info-light: #ecfeff;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --sidebar-width: 280px;
  --header-height: 72px;
  --radius: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px -3px rgba(0,0,0,.1), 0 4px 10px -2px rgba(0,0,0,.05);
}

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  margin: 0;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-width);
  height: 100vh;
  background: white;
  border-right: 1px solid var(--gray-200);
  display: flex;
  flex-direction: column;
  z-index: 1000;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y: auto;
}
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--gray-100);
  display: flex; align-items: center; gap: 12px;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 18px; font-weight: 800;
  flex-shrink: 0;
}
.logo-text { font-size: 20px; font-weight: 800; color: var(--gray-900); letter-spacing: -0.5px; }
.logo-sub { font-size: 11px; color: var(--gray-400); font-weight: 500; letter-spacing: .5px; text-transform: uppercase; }

.sidebar-stats {
  padding: 16px 20px;
  border-bottom: 1px solid var(--gray-100);
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.stat-chip {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}
.stat-chip .num { font-size: 20px; font-weight: 700; color: var(--gray-900); line-height: 1; }
.stat-chip .lbl { font-size: 10px; color: var(--gray-400); font-weight: 600; text-transform: uppercase; letter-spacing: .3px; margin-top: 2px; }

.sidebar-section { padding: 16px 20px 8px; }
.sidebar-label { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

.filter-group { margin-bottom: 6px; }
.filter-btn {
  width: 100%;
  background: none;
  border: none;
  padding: 8px 10px;
  border-radius: 8px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-600);
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: all .15s;
  text-align: left;
}
.filter-btn:hover { background: var(--gray-50); color: var(--gray-800); }
.filter-btn.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.filter-btn .count {
  margin-left: auto;
  font-size: 11px;
  background: var(--gray-200);
  color: var(--gray-600);
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 600;
}
.filter-btn.active .count { background: var(--primary); color: white; }
.filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── MAIN CONTENT ── */
.main-wrap {
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  display: flex; flex-direction: column;
  transition: margin-left .3s cubic-bezier(.4,0,.2,1);
}

/* ── HEADER ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: white;
  border-bottom: 1px solid var(--gray-200);
  height: var(--header-height);
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
}
.topbar-title { font-size: 16px; font-weight: 700; color: var(--gray-900); white-space: nowrap; }
.topbar-sub { font-size: 12px; color: var(--gray-400); font-weight: 500; white-space: nowrap; }

.search-wrap {
  flex: 1; max-width: 480px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: var(--gray-50);
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  padding: 9px 16px 9px 42px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  color: var(--gray-800);
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.search-wrap input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  background: white;
}
.search-wrap .search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--gray-400); font-size: 14px; pointer-events: none;
}
.search-wrap .search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  color: var(--gray-400); font-size: 12px;
  cursor: pointer; padding: 2px; display: none;
}
.search-wrap.has-value .search-clear { display: block; }

.view-toggle {
  display: flex;
  background: var(--gray-100);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
}
.view-btn {
  border: none; background: none; cursor: pointer;
  width: 34px; height: 30px;
  border-radius: 6px;
  color: var(--gray-400);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all .15s;
}
.view-btn.active { background: white; color: var(--primary); box-shadow: var(--shadow-sm); }

.toggle-sidebar-btn {
  display: none;
  border: none;
  background: var(--gray-100);
  width: 36px; height: 36px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--gray-600);
  font-size: 16px;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── FILTER BAR ── */
.filter-bar {
  background: white;
  border-bottom: 1px solid var(--gray-100);
  padding: 10px 24px;
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
}
.filter-tag {
  display: flex; align-items: center; gap: 6px;
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-600);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.filter-tag:hover { background: var(--gray-200); }
.filter-tag.active { background: var(--primary); border-color: var(--primary); color: white; }
.results-info { margin-left: auto; font-size: 12px; color: var(--gray-400); font-weight: 500; white-space: nowrap; }

/* ── CONTENT ── */
.content { padding: 20px 24px; flex: 1; }

/* ── TABLE VIEW ── */
.table-card {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--gray-200);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.table-responsive { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
thead th {
  background: var(--gray-50);
  padding: 12px 14px;
  font-size: 11px;
  font-weight: 700;
  color: var(--gray-400);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--gray-200);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
thead th:hover { background: var(--gray-100); color: var(--gray-600); }
thead th .sort-icon { margin-left: 4px; opacity: .4; }
thead th.sorted .sort-icon { opacity: 1; color: var(--primary); }

tbody tr {
  border-bottom: 1px solid var(--gray-100);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--gray-50); }

td { padding: 12px 14px; font-size: 13px; vertical-align: middle; }

.contact-cell { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}
.avatar-placeholder {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  flex-shrink: 0;
  color: white;
}
.contact-name { font-weight: 600; color: var(--gray-800); font-size: 13px; line-height: 1.3; }
.contact-email { font-size: 11px; color: var(--gray-400); font-weight: 500; margin-top: 1px; }

.phone-cell { font-size: 12px; color: var(--gray-600); font-weight: 500; }
.phone-cell .wa-badge { display: inline-block; width: 14px; height: 14px; background: #25D366; border-radius: 50%; color: white; font-size: 8px; text-align: center; line-height: 14px; margin-left: 4px; }

/* STATUS BADGES */
.badge-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px; font-weight: 600;
  white-space: nowrap;
}
.badge-status::before { content: ""; width: 6px; height: 6px; border-radius: 50%; }
.s-parado { background: var(--gray-100); color: var(--gray-500); }
.s-parado::before { background: var(--gray-400); }
.s-contacto { background: var(--info-light); color: var(--info); }
.s-contacto::before { background: var(--info); }
.s-interessado { background: var(--warning-light); color: var(--warning); }
.s-interessado::before { background: var(--warning); }
.s-em-andamento { background: var(--purple-light); color: var(--purple); }
.s-em-andamento::before { background: var(--purple); }
.s-em-uso { background: var(--success-light); color: var(--success); }
.s-em-uso::before { background: var(--success); }
.s-rejeitado { background: var(--danger-light); color: var(--danger); }
.s-rejeitado::before { background: var(--danger); }
.s-nao-atende { background: #fff7ed; color: #ea580c; }
.s-nao-atende::before { background: #ea580c; }

.type-badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .3px;
}
.type-0 { background: var(--gray-100); color: var(--gray-500); }
.type-1 { background: var(--primary-light); color: var(--primary); }

.province-badge {
  background: var(--gray-100);
  color: var(--gray-600);
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: capitalize;
  white-space: nowrap;
}

/* ── GRID VIEW ── */
.grid-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.contact-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.contact-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.card-img-wrap {
  height: 140px;
  background: var(--gray-100);
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.card-img-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  font-size: 36px; font-weight: 800; color: white;
}
.card-status-tag {
  position: absolute; top: 10px; right: 10px;
}
.card-body { padding: 14px; }
.card-name {
  font-size: 14px; font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  line-height: 1.4;
}
.card-meta { font-size: 11px; color: var(--gray-400); font-weight: 500; display: flex; flex-direction: column; gap: 4px; }
.card-meta-row { display: flex; align-items: flex-start; gap: 6px; }
.card-meta-row i { margin-top: 1px; font-size: 11px; flex-shrink: 0; width: 12px; color: var(--gray-400); }
.card-footer-bar {
  padding: 10px 14px;
  border-top: 1px solid var(--gray-100);
  display: flex; align-items: center; gap: 8px;
}
.wa-icon { color: #25D366; font-size: 14px; }

/* ── PAGINATION ── */
.pagination-wrap {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-top: 1px solid var(--gray-200);
  flex-wrap: wrap; gap: 10px;
}
.pagination-info { font-size: 12px; color: var(--gray-400); font-weight: 500; }
.pagination { margin: 0; }
.page-link {
  font-family: 'Montserrat', sans-serif;
  font-size: 12px; font-weight: 600;
  color: var(--gray-600);
  border: 1px solid var(--gray-200);
  border-radius: 8px !important;
  padding: 6px 12px;
  margin: 0 2px;
  min-width: 34px;
  text-align: center;
}
.page-item.active .page-link { background: var(--primary); border-color: var(--primary); color: white; }
.page-link:hover { background: var(--gray-100); color: var(--gray-800); }
.page-size-select {
  font-family: 'Montserrat', sans-serif;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: 5px 10px;
  color: var(--gray-600);
  background: white;
  cursor: pointer;
  outline: none;
}

/* ── OVERLAY ── */
.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 999;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--gray-400);
}
.empty-state i { font-size: 48px; margin-bottom: 16px; opacity: .3; }
.empty-state h4 { font-size: 16px; font-weight: 700; color: var(--gray-500); }
.empty-state p { font-size: 13px; }

/* ── MOBILE ── */
@media (max-width: 991px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main-wrap { margin-left: 0; }
  .toggle-sidebar-btn { display: flex; }
  .topbar-title { display: none; }
  .grid-view { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
}
@media (max-width: 600px) {
  .topbar { padding: 0 14px; gap: 10px; }
  .content { padding: 14px; }
  .filter-bar { padding: 8px 14px; }
  .grid-view { grid-template-columns: 1fr 1fr; gap: 10px; }
  .pagination-wrap { flex-direction: column; align-items: flex-start; }
  .results-info { margin-left: 0; }
  .filter-bar .filter-tag { font-size: 11px; padding: 4px 9px; }
}
@media (max-width: 420px) {
  .grid-view { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">E</div>
    <div>
      <div class="logo-text">EduAll</div>
      <div class="logo-sub">Gestão de Contactos</div>
    </div>
  </div>

  <div class="sidebar-stats">
    <div class="stat-chip">
      <div class="num" id="statTotal">0</div>
      <div class="lbl">Total</div>
    </div>
    <div class="stat-chip">
      <div class="num" id="statFiltered">0</div>
      <div class="lbl">Filtrados</div>
    </div>
    <div class="stat-chip">
      <div class="num" id="statUso">0</div>
      <div class="lbl">Em Uso</div>
    </div>
    <div class="stat-chip">
      <div class="num" id="statInteressado">0</div>
      <div class="lbl">Interessados</div>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label"><i class="fa fa-circle-dot"></i> Estado</div>
    <div id="statusFilters"></div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label"><i class="fa fa-map-marker-alt"></i> Província</div>
    <div id="provinceFilters"></div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label"><i class="fa fa-graduation-cap"></i> Tipo</div>
    <div>
      <button class="filter-btn active" data-type-filter="all" onclick="setTypeFilter(this,'all')">
        <i class="fa fa-list fa-fw"></i> Todos <span class="count" id="typeAllCount">0</span>
      </button>
      <button class="filter-btn" data-type-filter="0" onclick="setTypeFilter(this,'0')">
        <i class="fa fa-school fa-fw"></i> Complexo/Colégio <span class="count" id="type0Count">0</span>
      </button>
      <button class="filter-btn" data-type-filter="1" onclick="setTypeFilter(this,'1')">
        <i class="fa fa-university fa-fw"></i> Instituto Superior <span class="count" id="type1Count">0</span>
      </button>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label"><i class="fab fa-whatsapp"></i> WhatsApp</div>
    <div>
      <button class="filter-btn active" data-wa-filter="all" onclick="setWaFilter(this,'all')">
        <i class="fa fa-list fa-fw"></i> Todos <span class="count" id="waAllCount">0</span>
      </button>
      <button class="filter-btn" data-wa-filter="1" onclick="setWaFilter(this,'1')">
        <i class="fab fa-whatsapp fa-fw" style="color:#25D366"></i> Com WhatsApp <span class="count" id="waYesCount">0</span>
      </button>
    </div>
  </div>

  <div class="sidebar-section pb-3">
    <div class="sidebar-label"><i class="fa fa-user-tie"></i> Comercial</div>
    <div id="comercialFilters"></div>
  </div>
</aside>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Main -->
<div class="main-wrap">

  <!-- Topbar -->
  <header class="topbar">
    <button class="toggle-sidebar-btn" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
    <div>
      <div class="topbar-title">Lista de Contactos</div>
    </div>
    <div class="search-wrap" id="searchWrap">
      <i class="fa fa-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="Pesquisar por nome, telefone, email, endereço..." oninput="onSearch(this)">
      <i class="fa fa-times search-clear" onclick="clearSearch()"></i>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnTable" onclick="setView('table')" title="Vista Tabela"><i class="fa fa-table-list"></i></button>
      <button class="view-btn" id="btnGrid" onclick="setView('grid')" title="Vista Grelha"><i class="fa fa-grip"></i></button>
    </div>
  </header>

  <!-- Filter bar -->
  <div class="filter-bar" id="filterBar">
    <span style="font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;">Ordenar:</span>
    <span class="filter-tag active" onclick="setSort(this,'name')" data-sort="name">Nome <i class="fa fa-arrow-up-a-z ms-1"></i></span>
    <span class="filter-tag" onclick="setSort(this,'date')" data-sort="date">Data</span>
    <span class="filter-tag" onclick="setSort(this,'province')" data-sort="province">Província</span>
    <span class="results-info" id="resultsInfo"></span>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- TABLE VIEW -->
    <div id="tableView" class="table-card">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('name')">Contacto <i class="fa fa-sort sort-icon"></i></th>
              <th onclick="sortBy('phone')">Telefone <i class="fa fa-sort sort-icon"></i></th>
              <th onclick="sortBy('status')">Estado <i class="fa fa-sort sort-icon"></i></th>
              <th onclick="sortBy('province')">Província <i class="fa fa-sort sort-icon"></i></th>
              <th onclick="sortBy('type')">Tipo <i class="fa fa-sort sort-icon"></i></th>
              <th onclick="sortBy('comercial')">Comercial <i class="fa fa-sort sort-icon"></i></th>
              <th onclick="sortBy('date')">Data <i class="fa fa-sort sort-icon"></i></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination-wrap">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="pagination-info" id="paginationInfo"></span>
          <select class="page-size-select" onchange="changePageSize(this)">
            <option value="25">25 por página</option>
            <option value="50">50 por página</option>
            <option value="100">100 por página</option>
          </select>
        </div>
        <nav><ul class="pagination" id="pagination"></ul></nav>
      </div>

  'interessado': 'fa-star',
  'em andamento': 'fa-spinner',
  'em uso': 'fa-check-circle',
  'rejeitado': 'fa-times-circle',
  'não atende': 'fa-phone-slash'
};
const PROVINCE_MAP = {
  'luanda':'Luanda','huambo':'Huambo','huila':'Huíla','benguela':'Benguela',
  'malanje':'Malanje','namibe':'Namibe','cabinda':'Cabinda',
  'cuanza sul':'Cuanza Sul','zaire':'Zaire'
};

function statusBadge(s) {
  const cls = STATUS_CLASS[s] || 's-parado';
  return `<span class="badge-status ${cls}">${STATUS_MAP[s]||s}</span>`;
}
function typeBadge(t) {
  return t===1 ? '<span class="type-badge type-1">Superior</span>' : '<span class="type-badge type-0">Básico</span>';
}
function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
}
function formatDate(d) {
  if(!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'2-digit'});
}
function avatarEl(c, size=36, radius='10px') {
  if(c.picture) return `<img src="${c.picture}" class="avatar" style="width:${size}px;height:${size}px;border-radius:${radius}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="avatar-placeholder" style="width:${size}px;height:${size}px;border-radius:${radius};background:${getColor(c.name)};display:none">${initials(c.name)}</div>`;
  return `<div class="avatar-placeholder" style="width:${size}px;height:${size}px;border-radius:${radius};background:${getColor(c.name)}">${initials(c.name)}</div>`;
}

// ── SIDEBAR SETUP ──
function buildSidebar() {
  // Status
  const statuses = ['all',...[...new Set(RAW_DATA.map(c=>c.status))].sort()];
  const sCounts = {};
  RAW_DATA.forEach(c => { sCounts[c.status] = (sCounts[c.status]||0)+1; });
  const sEl = document.getElementById('statusFilters');
  sEl.innerHTML = statuses.map(s => {
    const label = s==='all' ? 'Todos' : (STATUS_MAP[s]||s);
    const icon = s==='all' ? 'fa-list' : (STATUS_ICON[s]||'fa-circle');
    const count = s==='all' ? RAW_DATA.length : (sCounts[s]||0);
    return `<button class="filter-btn ${s==='all'?'active':''}" data-status-filter="${s}" onclick="setStatusFilter(this,'${s}')">
      <i class="fa ${icon} fa-fw"></i> ${label} <span class="count">${count}</span>
    </button>`;
  }).join('');

  // Provinces
  const provinces = ['all',...[...new Set(RAW_DATA.map(c=>c.province||'luanda'))].sort()];
  const pCounts = {};
  RAW_DATA.forEach(c => { const p=c.province||'luanda'; pCounts[p]=(pCounts[p]||0)+1; });
  const pEl = document.getElementById('provinceFilters');
  pEl.innerHTML = provinces.map(p => {
    const label = p==='all' ? 'Todas' : (PROVINCE_MAP[p]||p.charAt(0).toUpperCase()+p.slice(1));
    const count = p==='all' ? RAW_DATA.length : (pCounts[p]||0);
    return `<button class="filter-btn ${p==='all'?'active':''}" data-province-filter="${p}" onclick="setProvinceFilter(this,'${p}')">
      <i class="fa fa-location-dot fa-fw"></i> ${label} <span class="count">${count}</span>
    </button>`;
  }).join('');

  // Comercials
  const comercials = ['all',...[...new Set(RAW_DATA.map(c=>c.comercial))].filter(Boolean).sort()];
  const cCounts = {};
  RAW_DATA.forEach(c => { if(c.comercial) cCounts[c.comercial]=(cCounts[c.comercial]||0)+1; });
  const cEl = document.getElementById('comercialFilters');
  cEl.innerHTML = comercials.map(c => {
    const label = c==='all' ? 'Todos' : c;
    const count = c==='all' ? RAW_DATA.length : (cCounts[c]||0);
    return `<button class="filter-btn ${c==='all'?'active':''}" data-com-filter="${c}" onclick="setComercialFilter(this,'${encodeURIComponent(c)}')">
      <i class="fa fa-user-tie fa-fw"></i> ${label} <span class="count">${count}</span>
    </button>`;
  }).join('');

  // Type counts
  document.getElementById('typeAllCount').textContent = RAW_DATA.length;
  document.getElementById('type0Count').textContent = RAW_DATA.filter(c=>c.type===0).length;
  document.getElementById('type1Count').textContent = RAW_DATA.filter(c=>c.type===1).length;
  document.getElementById('waAllCount').textContent = RAW_DATA.length;
  document.getElementById('waYesCount').textContent = RAW_DATA.filter(c=>c.hasWhatsapp1===1||c.hasWhatsapp2===1).length;

  // Stats
  document.getElementById('statTotal').textContent = RAW_DATA.length;
  document.getElementById('statUso').textContent = RAW_DATA.filter(c=>c.status==='em uso').length;
  document.getElementById('statInteressado').textContent = RAW_DATA.filter(c=>c.status==='interessado').length;
}

// ── FILTERS ──
function setActiveBtn(selector, el) {
  document.querySelectorAll(selector).forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function setStatusFilter(el, val) {
  activeStatus = val; currentPage=1;
  setActiveBtn('[data-status-filter]', el);
  applyFilters();
}
function setProvinceFilter(el, val) {
  activeProvince = val; currentPage=1;
  setActiveBtn('[data-province-filter]', el);
  applyFilters();
}
function setTypeFilter(el, val) {
  activeType = val; currentPage=1;
  setActiveBtn('[data-type-filter]', el);
  applyFilters();
}
function setWaFilter(el, val) {
  activeWa = val; currentPage=1;
  setActiveBtn('[data-wa-filter]', el);
  applyFilters();
}
function setComercialFilter(el, val) {
  activeComercial = decodeURIComponent(val); currentPage=1;
  setActiveBtn('[data-com-filter]', el);
  applyFilters();
}
function setSort(el, field) {
  document.querySelectorAll('[data-sort]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  sortField = field; sortDir = 1; currentPage=1;
  applyFilters();
}
function sortBy(field) {
  if(sortField===field) sortDir*=-1; else { sortField=field; sortDir=1; }
  currentPage=1;
  applyFilters();
}
function onSearch(el) {
  searchQuery = el.value.trim().toLowerCase();
  document.getElementById('searchWrap').classList.toggle('has-value', !!searchQuery);
  currentPage=1;
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value='';
  searchQuery='';
  document.getElementById('searchWrap').classList.remove('has-value');
  currentPage=1;
  applyFilters();
}

function applyFilters() {
  filtered = RAW_DATA.filter(c => {
    if(activeStatus!=='all' && c.status!==activeStatus) return false;
    if(activeProvince!=='all' && (c.province||'luanda')!==activeProvince) return false;
    if(activeType!=='all' && String(c.type)!==activeType) return false;
    if(activeWa!=='all' && !(c.hasWhatsapp1===1||c.hasWhatsapp2===1)) return false;
    if(activeComercial!=='all' && c.comercial!==activeComercial) return false;
    if(searchQuery) {
      const q=searchQuery;
      const hay=[c.name,c.phone,c.phone2,c.email,c.address,c.province,c.comercial,c.addedBy].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a,b)=>{
    let va,vb;
    if(sortField==='name'){va=a.name||'';vb=b.name||'';}
    else if(sortField==='date'){va=a.registerDate||'';vb=b.registerDate||'';}
    else if(sortField==='province'){va=a.province||'';vb=b.province||'';}
    else if(sortField==='status'){va=a.status||'';vb=b.status||'';}
    else if(sortField==='type'){va=a.type;vb=b.type;}
    else if(sortField==='comercial'){va=a.comercial||'';vb=b.comercial||'';}
    else if(sortField==='phone'){va=a.phone||'';vb=b.phone||'';}
    else{va=a.name||'';vb=b.name||'';}
    if(va<vb)return -sortDir; if(va>vb)return sortDir; return 0;
  });

  document.getElementById('statFiltered').textContent = filtered.length;
  document.getElementById('resultsInfo').textContent = `${filtered.length} resultado${filtered.length!==1?'s':''} encontrado${filtered.length!==1?'s':''}`;

  renderView();
}

// ── RENDER ──
function renderView() {
  if(currentView==='table') renderTable();
  else renderGrid();
}

function renderTable() {
  const start = (currentPage-1)*pageSize;
  const page = filtered.slice(start, start+pageSize);
  const tbody = document.getElementById('tableBody');

  if(!filtered.length) {
    tbody.innerHTML='';
    document.getElementById('emptyState').classList.remove('d-none');
    document.getElementById('tableView').style.display='none';
    return;
  }
  document.getElementById('emptyState').classList.add('d-none');
  document.getElementById('tableView').style.display='';

  tbody.innerHTML = page.map(c => `
    <tr>
      <td>
        <div class="contact-cell">
          ${avatarEl(c)}
          <div>
            <div class="contact-name">${c.name}</div>
            <div class="contact-email">${c.email&&c.email!=='###@gmail.com'&&!c.email.startsWith('xxx')?c.email:''}</div>
          </div>
        </div>
      </td>
      <td class="phone-cell">
        ${c.phone||'—'}
        ${c.hasWhatsapp1===1?'<span class="wa-badge" title="WhatsApp"><i class="fab fa-whatsapp"></i></span>':''}
        ${c.phone2?'<br><span style="color:var(--gray-400)">'+(c.phone2)+'</span>':''}
      </td>
      <td>${statusBadge(c.status)}</td>
      <td><span class="province-badge">${PROVINCE_MAP[c.province||'luanda']||c.province||'—'}</span></td>
      <td>${typeBadge(c.type)}</td>
      <td style="font-size:12px;font-weight:600;color:var(--gray-600)">${c.comercial||'—'}</td>
      <td style="font-size:11px;color:var(--gray-400);font-weight:500">${formatDate(c.registerDate)}</td>
    </tr>
  `).join('');

  renderPagination();
}

function renderGrid() {
  const start = (currentPage-1)*pageSize;
  const page = filtered.slice(start, start+pageSize);
  const grid = document.getElementById('gridBody');

  if(!filtered.length) {
    grid.innerHTML='';
    document.getElementById('emptyState').classList.remove('d-none');
    document.getElementById('gridView').style.display='none';
    return;
  }
  document.getElementById('emptyState').classList.add('d-none');
  document.getElementById('gridView').style.display='';

  grid.innerHTML = page.map(c => {
    const bg = getColor(c.name);
    const imgSection = c.picture
      ? `<div class="card-img-wrap"><img src="${c.picture}" onerror="this.parentNode.innerHTML='<div class=\'card-img-placeholder\' style=\'background:${bg}\'>${initials(c.name)}</div>'"><div class="card-status-tag">${statusBadge(c.status)}</div></div>`
      : `<div class="card-img-wrap"><div class="card-img-placeholder" style="background:${bg}">${initials(c.name)}</div><div class="card-status-tag">${statusBadge(c.status)}</div></div>`;
    return `<div class="contact-card">
      ${imgSection}
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-meta">
          ${c.phone?`<div class="card-meta-row"><i class="fa fa-phone"></i><span>${c.phone}</span></div>`:''}
          ${c.email&&!c.email.startsWith('###')&&!c.email.startsWith('xxx')?`<div class="card-meta-row"><i class="fa fa-envelope"></i><span>${c.email}</span></div>`:''}
          ${c.address?`<div class="card-meta-row"><i class="fa fa-location-dot"></i><span>${c.address.length>50?c.address.slice(0,50)+'…':c.address}</span></div>`:''}
        </div>
      </div>
      <div class="card-footer-bar">
        <span class="province-badge">${PROVINCE_MAP[c.province||'luanda']||c.province||'—'}</span>
        ${typeBadge(c.type)}
        ${c.hasWhatsapp1===1?'<i class="fab fa-whatsapp wa-icon ms-1" title="Tem WhatsApp"></i>':''}
        <span style="margin-left:auto;font-size:11px;color:var(--gray-400);font-weight:500">${c.comercial||''}</span>
      </div>
    </div>`;
  }).join('');

  renderPaginationGrid();
}

function renderPagination() {
  const total = Math.ceil(filtered.length/pageSize);
  const info = document.getElementById('paginationInfo');
  const ul = document.getElementById('pagination');
  const start=(currentPage-1)*pageSize+1, end=Math.min(currentPage*pageSize,filtered.length);
  info.textContent = filtered.length ? `Mostrando ${start}–${end} de ${filtered.length}` : '';

  if(total<=1){ul.innerHTML='';return;}
  let pages=[];
  if(total<=7){for(let i=1;i<=total;i++)pages.push(i);}
  else{
    pages=[1];
    if(currentPage>3)pages.push('...');
    for(let i=Math.max(2,currentPage-1);i<=Math.min(total-1,currentPage+1);i++)pages.push(i);
    if(currentPage<total-2)pages.push('...');
    pages.push(total);
  }
  ul.innerHTML = [
    `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" onclick="${currentPage>1?'goPage(currentPage-1)':''}">‹</a></li>`,
    ...pages.map(p=>p==='...'
      ? `<li class="page-item disabled"><span class="page-link">…</span></li>`
      : `<li class="page-item ${p===currentPage?'active':''}"><a class="page-link" onclick="goPage(${p})">${p}</a></li>`),
    `<li class="page-item ${currentPage===total?'disabled':''}"><a class="page-link" onclick="${currentPage<total?'goPage(currentPage+1)':''}">›</a></li>`
  ].join('');
}
function renderPaginationGrid() {
  const total = Math.ceil(filtered.length/pageSize);
  const info = document.getElementById('paginationInfoGrid');
  const ul = document.getElementById('paginationGrid');
  const start=(currentPage-1)*pageSize+1, end=Math.min(currentPage*pageSize,filtered.length);
  info.textContent = filtered.length ? `Mostrando ${start}–${end} de ${filtered.length}` : '';

  if(total<=1){ul.innerHTML='';return;}
  let pages=[];
  if(total<=7){for(let i=1;i<=total;i++)pages.push(i);}
  else{
    pages=[1];
    if(currentPage>3)pages.push('...');
    for(let i=Math.max(2,currentPage-1);i<=Math.min(total-1,currentPage+1);i++)pages.push(i);
    if(currentPage<total-2)pages.push('...');
    pages.push(total);
  }
  ul.innerHTML = [
    `<li class="page-item ${currentPage===1?'disabled':''}"><a class="page-link" onclick="${currentPage>1?'goPage(currentPage-1)':''}">‹</a></li>`,
    ...pages.map(p=>p==='...'
      ? `<li class="page-item disabled"><span class="page-link">…</span></li>`
      : `<li class="page-item ${p===currentPage?'active':''}"><a class="page-link" onclick="goPage(${p})">${p}</a></li>`),
    `<li class="page-item ${currentPage===total?'disabled':''}"><a class="page-link" onclick="${currentPage<total?'goPage(currentPage+1)':''}">›</a></li>`
  ].join('');
}
function goPage(p) { currentPage=p; renderView(); window.scrollTo(0,0); }
function changePageSize(sel) { pageSize=parseInt(sel.value); currentPage=1; renderView(); }
function changePageSizeGrid(sel) { pageSize=parseInt(sel.value); currentPage=1; renderView(); }

// ── VIEW TOGGLE ──
function setView(v) {
  currentView=v; currentPage=1;
  document.getElementById('tableView').classList.toggle('d-none', v!=='table');
  document.getElementById('gridView').classList.toggle('d-none', v!=='grid');
  document.getElementById('btnTable').classList.toggle('active', v==='table');
  document.getElementById('btnGrid').classList.toggle('active', v==='grid');
  renderView();
}

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ── INIT ──
buildSidebar();
applyFilters();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
