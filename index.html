  <style>
    :root{
      --card:#fff; --muted:#64748b; --bg:#f6f8fc; --ring:rgba(59,130,246,.18);
      --ok:#10b981; --warn:#f59e0b; --danger:#ef4444; --indigo:#4f46e5; --cyan:#0891b2; --paused:#64748b;
    }
    html,body{height:100%;}
    body{
      font-family: "Montserrat", system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      background: radial-gradient(1000px 500px at -10% -15%, #eef2ff 0, #f8fafc 60%, #f8fafc 100%);
      color:#0f172a;
    }
    .wrap{
      min-height:100%;
      display:flex;
      align-items:flex-start;
      padding: 18px 12px;
    }
    .results-card{
      width:100%;
      background:var(--card);
      border:0; 
      overflow:hidden;
    }
    .header{
      padding:18px 20px; background:linear-gradient(180deg,#fff,#fbfcff);
      border-bottom:1px solid #eef2ff;
    }
    .header h1{font-size:1.45rem; font-weight:800; margin:0;}
    .chip{display:inline-flex;align-items:center;gap:.45rem;background:#eef2ff;color:#2563eb;padding:.35rem .6rem;border-radius:999px;font-weight:700;font-size:.85rem}

    .toolbar{padding:14px 16px; background:#fff; border-bottom:1px solid #eef2ff;}
    .form-control, .form-select{border-radius:14px; border:1px solid #e5e7eb;}
    .btn-soft{border:1px solid #e5e7eb; background:#fff; border-radius:12px; font-weight:700;}
    .btn-soft:hover{background:#f8fafc;}
    .table{margin-bottom:0;}
    .table thead th{font-size:.82rem;color:#6b7280;font-weight:700;background:#fff;border-bottom:1px solid #eef2ff;}
    .table > :not(caption) > * > *{padding:.9rem .75rem;border-bottom:0;}
    .table-hover tbody tr:hover{background:#f8fafc;}
    .avatar{width:28px;height:28px;border-radius:50%;background:#e2e8f0;display:inline-grid;place-items:center;font-size:.75rem;font-weight:800;color:#475569;}
    .badge-status{font-weight:700;border-radius:999px;padding:.4rem .6rem;font-size:.74rem}
    .s-parado{background:#fef3c7;color:#a16207}
    .s-interessado{background:#cffafe;color:#155e75}
    .s-em_andamento{background:#e0e7ff;color:#3730a3}
    .s-rejeitado{background:#fee2e2;color:#991b1b}
    .s-contacto{background:#dcfce7;color:#065f46}
    .s-reunido{background:#ede9fe;color:#5b21b6}
    .s-activo,.s-ativo{background:#bbf7d0;color:#14532d}
    .s-invalido{background:#ffe4e6;color:#9f1239}

    /* MOBILE CARD LIST */
    @media (max-width: 768px){
      .table-responsive{display:none;}
      .list-mobile{display:block;}
    }
    @media (min-width: 769px){
      .list-mobile{display:none;}
    }
    .mcard{
      background:#fff; border:1px solid #eef2ff; border-radius:16px; padding:12px; margin:10px 16px;
      box-shadow:0 4px 12px rgba(2,6,23,.05);
    }
    .mrow{display:flex;justify-content:space-between;gap:12px;align-items:center}
    .mrow + .mrow{margin-top:8px;}
    .line{height:1px;background:#eef2ff;margin:10px 0}
    .pill{padding:.25rem .5rem;border-radius:999px;background:#f1f5f9;color:#0f172a;font-weight:700;font-size:.73rem}
    .bi-filetype-pdf{color:#ef4444}
    .bi-play-fill{color:#16a34a}
    .bi-pause-fill{color:var(--paused)}
  </style>
</head>
<body>
  <div class="wrap container-fluid">

    <div class="results-card">
      <!-- Cabeçalho -->
      <div class="header d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div class="d-flex align-items-center gap-3">
          <h1 class="mb-0">Results</h1>
          <span class="chip"><i class="bi bi-people-fill"></i> +<span id="totalCount">0</span> Contactos</span>
        </div>
        <div class="d-flex gap-2">
          <button id="exportPdfBtn" class="btn btn-soft"><i class="bi bi-filetype-pdf me-1"></i>Exportar PDF</button>
          <button id="toggleAutoBtn" class="btn btn-soft" title="Rodar páginas automaticamente">
            <i class="bi bi-play-fill me-1" id="autoIcon"></i><span id="autoText">Auto-rodar</span>
          </button>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="row g-2">
          <div class="col-12 col-lg-4">
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
              <input id="searchInput" type="search" class="form-control border-start-0" placeholder="Pesquisar por nome, contacto, e-mail, morada…">
            </div>
          </div>
          <div class="col-6 col-lg-3">
            <select id="statusFilter" class="form-select">
              <option value="">Todos os estados</option>
              <!-- options geradas dinamicamente -->
            </select>
          </div>
          <div class="col-6 col-lg-3">
            <select id="comercialFilter" class="form-select">
              <option value="">Todos os comerciais</option>
              <!-- options dinâmicas -->
            </select>
          </div>
          <div class="col-6 col-lg-2">
            <select id="pageSize" class="form-select">
              <option>10</option>
              <option>15</option>
              <option selected>25</option>
              <option>50</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Tabela (desktop) -->
      <div class="table-responsive">
        <table class="table table-hover align-middle table-borderless">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome da escola</th>
              <th>Contactos</th>
              <th>E-mail</th>
              <th>Estado</th>
              <th>Comercial</th>
              <th>Província / País</th>
              <th class="text-end">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <!-- Lista (mobile) -->
      <div class="list-mobile" id="mobileList"></div>

      <!-- Footer -->
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 p-3 border-top">
        <div class="small text-muted">
          <span id="rangeLabel">0–0</span> de <span id="filteredCount">0</span> resultados
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="small text-muted">Páginas</span>
          <ul class="pagination mb-0" id="pagination"></ul>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL Detalhes -->
  <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-journal-text me-2"></i>Detalhes do contacto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <div id="detailsBody"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-soft" data-bs-dismiss="modal"><i class="bi bi-x-lg me-1"></i>Fechar</button>
        </div>
      </div>
    </div>
  </div>

    const $ = s => document.querySelector(s);
    const tbody = $("#tbody");
    const mobileList = $("#mobileList");
    const paginationEl = $("#pagination");
    const searchInput = $("#searchInput");
    const statusFilter = $("#statusFilter");
    const comercialFilter = $("#comercialFilter");
    const pageSizeSel = $("#pageSize");
    const rangeLabel = $("#rangeLabel");
    const totalCountEl = $("#totalCount");
    const filteredCountEl = $("#filteredCount");

    let currentPage = 1;
    let pageSize = parseInt(pageSizeSel.value,10);
    let autoTimer=null, autoRotate=false;

    // estados existentes mapeados para classes
    const stateClass = (s) => {
      const k = (s||"").toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu,"").replace(/\s+/g,"_");
      return ({
        "parado":"s-parado","interessado":"s-interessado","em_andamento":"s-em_andamento","em":"s-em_andamento",
        "rejeitado":"s-rejeitado","contacto":"s-contacto","reunido":"s-reunido","invalido":"s-invalido","ativo":"s-activo","activo":"s-activo"
      }[k]) || "s-parado";
    };

    function initials(name){
      const p=(name||"").split(" ").filter(Boolean);
      return (p[0]?.[0]||"?") + (p[p.length-1]?.[0]||"");
    }

    // preencher filtros dinâmicos
    (function buildFilters(){
      totalCountEl.textContent = contacts.length;
      const estados = Array.from(new Set(contacts.map(c=> (c.ed_contact_status||"").toLowerCase())));
      estados.sort().forEach(s=>{
        if(!s) return;
        const op=document.createElement("option");
        op.value=s; op.textContent=s.charAt(0).toUpperCase()+s.slice(1);
        statusFilter.appendChild(op);
      });
      const comerciais = Array.from(new Set(contacts.map(c=> c.ed_contact_comercial||"")));
      comerciais.sort().forEach(s=>{
        if(!s) return;
        const op=document.createElement("option");
        op.value=s; op.textContent=s;
        comercialFilter.appendChild(op);
      });
    })();

    // filtros + pesquisa
    const norm = v => (v||"").toString().toLowerCase();
    function filteredData(){
      const q = norm(searchInput.value);
      const st = norm(statusFilter.value);
      const cm = norm(comercialFilter.value);

      return contacts.filter(c=>{
        const text = [c.ed_contact_name,c.ed_contact_phone,c.ed_contact_email,c.ed_contact_address,c.ed_contact_province,c.ed_contact_country,c.ed_contact_comercial]
          .map(norm).join(" ");
        const okQ = !q || text.includes(q);
        const okS = !st || norm(c.ed_contact_status)===st;
        const okC = !cm || norm(c.ed_contact_comercial)===cm;
        return okQ && okS && okC;
      });
    }

    function paginate(arr, page, per){ const s=(page-1)*per; return arr.slice(s, s+per); }

    function render(){
      const all = filteredData();
      const total = all.length;
      filteredCountEl.textContent = total;

      const totalPages = Math.max(1, Math.ceil(total/pageSize));
      if(currentPage>totalPages) currentPage=totalPages;

      const pageData = paginate(all, currentPage, pageSize);
      const startIdx = total ? (currentPage-1)*pageSize+1 : 0;
      const endIdx   = total ? startIdx+pageData.length-1 : 0;
      rangeLabel.textContent = `${startIdx}–${endIdx}`;

      // Desktop table
      tbody.innerHTML = pageData.map((c,i)=>`
        <tr>
          <td class="text-muted fw-bold">${startIdx+i}</td>
          <td>
            <div class="d-flex align-items-center gap-2">
              <span class="avatar">${initials(c.ed_contact_name)}</span>
              <div class="fw-semibold">${c.ed_contact_name||""}</div>
            </div>
          </td>
          <td><span class="fw-semibold">${c.ed_contact_phone||"-"}</span></td>
          <td><a class="text-decoration-none" href="mailto:${c.ed_contact_email||''}">${c.ed_contact_email||"-"}</a></td>
          <td><span class="badge badge-status ${stateClass(c.ed_contact_status)} text-uppercase">${c.ed_contact_status||"-"}</span></td>
          <td>${c.ed_contact_comercial||"-"}</td>
          <td class="text-capitalize">${c.ed_contact_province||"-"} / ${c.ed_contact_country||"-"}</td>
          <td class="text-end">
            <div class="btn-group">
              <button class="btn btn-soft btn-sm" title="Detalhes" onclick='openDetails(${JSON.stringify(c).replaceAll("'","&#39;")})'><i class="bi bi-journal-text"></i></button>
              <a class="btn btn-soft btn-sm" title="E-mail" href="mailto:${c.ed_contact_email||''}"><i class="bi bi-envelope"></i></a>
              <a class="btn btn-soft btn-sm" title="WhatsApp" target="_blank" href="https://wa.me/${(c.ed_contact_phone||'').replace(/\D/g,'')}"><i class="bi bi-whatsapp"></i></a>
            </div>
          </td>
        </tr>
      `).join("");

      // Mobile list
      mobileList.innerHTML = pageData.map((c,i)=>`
        <div class="mcard">
          <div class="mrow">
            <div class="d-flex align-items-center gap-2">
              <span class="avatar">${initials(c.ed_contact_name)}</span>
              <div>
                <div class="fw-bold">${c.ed_contact_name||""}</div>
                <div class="small text-muted">${c.ed_contact_province||"-"} · ${c.ed_contact_country||"-"}</div>
              </div>
            </div>
            <span class="badge badge-status ${stateClass(c.ed_contact_status)} text-uppercase">${c.ed_contact_status||"-"}</span>
          </div>
          <div class="line"></div>
          <div class="mrow"><span class="pill"><i class="bi bi-telephone me-1"></i> ${c.ed_contact_phone||"-"}</span><span class="pill"><i class="bi bi-person-badge me-1"></i>${c.ed_contact_comercial||"-"}</span></div>
          <div class="mrow mt-2">
            <a class="btn btn-soft btn-sm" href="mailto:${c.ed_contact_email||''}"><i class="bi bi-envelope me-1"></i>E-mail</a>
            <div class="d-flex gap-2">
              <a class="btn btn-soft btn-sm" target="_blank" href="https://wa.me/${(c.ed_contact_phone||'').replace(/\D/g,'')}"><i class="bi bi-whatsapp"></i></a>
              <button class="btn btn-soft btn-sm" onclick='openDetails(${JSON.stringify(c).replaceAll("'","&#39;")})'><i class="bi bi-journal-text"></i></button>
            </div>
          </div>
        </div>
      `).join("");

      renderPagination(totalPages);
    }

    function renderPagination(totalPages){
      let html="";
      const prevDis = currentPage===1 ? " disabled" : "";
      const nextDis = currentPage===totalPages ? " disabled" : "";
      html += `<li class="page-item${prevDis}"><a class="page-link" href="#" onclick="gotoPage(${currentPage-1});return false;">&laquo;</a></li>`;
      const win=5;
      let start=Math.max(1, currentPage-Math.floor(win/2));
      let end=Math.min(totalPages, start+win-1);
      if(end-start+1<win){ start=Math.max(1, end-win+1); }
      for(let p=start;p<=end;p++){
        html += `<li class="page-item ${p===currentPage?'active':''}"><a class="page-link" href="#" onclick="gotoPage(${p});return false;">${p}</a></li>`;
      }
      html += `<li class="page-item${nextDis}"><a class="page-link" href="#" onclick="gotoPage(${currentPage+1});return false;">&raquo;</a></li>`;
      paginationEl.innerHTML = html;
    }
    window.gotoPage = (p)=>{ currentPage=Math.max(1,p); render(); };

    function openDetails(c){
      const el=$("#detailsBody");
      el.innerHTML = `
        <div class="row gy-3">
          <div class="col-md-6"><div class="p-3 rounded-3 border">
            <div class="fw-bold mb-1"><i class="bi bi-mortarboard me-1"></i>Nome da escola</div>${c.ed_contact_name||"-"}
          </div></div>
          <div class="col-md-6"><div class="p-3 rounded-3 border">
            <div class="fw-bold mb-1"><i class="bi bi-person-badge me-1"></i>Comercial</div>${c.ed_contact_comercial||"-"}
          </div></div>
          <div class="col-md-6"><div class="p-3 rounded-3 border">
            <div class="fw-bold mb-1"><i class="bi bi-telephone me-1"></i>Contactos</div>${c.ed_contact_phone||"-"}
          </div></div>
          <div class="col-md-6"><div class="p-3 rounded-3 border">
            <div class="fw-bold mb-1"><i class="bi bi-envelope-at me-1"></i>E-mail</div>${c.ed_contact_email||"-"}
          </div></div>
          <div class="col-md-6"><div class="p-3 rounded-3 border">
            <div class="fw-bold mb-1"><i class="bi bi-geo me-1"></i>Província / País</div>${(c.ed_contact_province||"-")} / ${(c.ed_contact_country||"-")}
          </div></div>
          <div class="col-md-6"><div class="p-3 rounded-3 border">
            <div class="fw-bold mb-1"><i class="bi bi-activity me-1"></i>Estado</div>
            <span class="badge badge-status ${stateClass(c.ed_contact_status)} text-uppercase">${c.ed_contact_status||"-"}</span>
          </div></div>
          <div class="col-12"><div class="p-3 rounded-3 border">
            <div class="fw-bold mb-1"><i class="bi bi-journal-text me-1"></i>Descrição / Notas</div>${(c.ed_contact_description||"—").toString().replace(/\n/g,"<br>")}
          </div></div>
        </div>`;
      new bootstrap.Modal("#detailsModal").show();
    }
    window.openDetails = openDetails;

    // Export PDF (página atual + filtros aplicados)
    $("#exportPdfBtn").addEventListener("click", ()=>{
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit:"pt", format:"a4" });
      doc.setFont("helvetica","bold"); doc.setFontSize(16);
      doc.text("Relatório de Contactos", 40, 50);
      doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(120);
      const all = filteredData(); const pageData = paginate(all, currentPage, pageSize);
      doc.text(`Filtrados: ${all.length} • Página ${currentPage}`, 40, 68);

      const rows = pageData.map((c,i)=>[
        i+1, c.ed_contact_name||"", c.ed_contact_phone||"", c.ed_contact_email||"",
        (c.ed_contact_status||"").toUpperCase(), c.ed_contact_comercial||"",
        `${c.ed_contact_province||""}/${c.ed_contact_country||""}`
      ]);
      doc.autoTable({
        head:[["#","Nome","Contactos","E-mail","Estado","Comercial","Prov./País"]],
        body:rows, startY:90, theme:"striped",
        styles:{fontSize:9, cellPadding:6},
        headStyles:{fillColor:[28,100,242], textColor:255},
        alternateRowStyles:{fillColor:[245,247,251]},
        didDrawPage:()=>{
          doc.setFontSize(9); doc.setTextColor(140);
          doc.text("Export • "+new Date().toLocaleString(), 40, doc.internal.pageSize.getHeight()-20);
        }
      });
      doc.save("contactos.pdf");
    });

    // Auto-rodar
    const autoIcon=$("#autoIcon"), autoText=$("#autoText");
    $("#toggleAutoBtn").addEventListener("click", ()=>{
      if(autoRotate){ clearInterval(autoTimer); autoRotate=false; autoIcon.classList.replace("bi-pause-fill","bi-play-fill"); autoText.textContent="Auto-rodar"; }
      else{
        autoTimer=setInterval(()=>{
          const tp=Math.max(1, Math.ceil(filteredData().length/pageSize));
          currentPage = currentPage>=tp ? 1 : currentPage+1;
          render();
        }, 7000);
        autoRotate=true; autoIcon.classList.replace("bi-play-fill","bi-pause-fill"); autoText.textContent="Pausar";
      }
    });

    // Eventos
    searchInput.addEventListener("input", ()=>{ currentPage=1; render(); });
    statusFilter.addEventListener("change", ()=>{ currentPage=1; render(); });
    comercialFilter.addEventListener("change", ()=>{ currentPage=1; render(); });
    pageSizeSel.addEventListener("change", ()=>{ pageSize=parseInt(pageSizeSel.value,10); currentPage=1; render(); });

    // Arranque
    render();
  </script>
</body>
</html>
